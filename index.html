    // 1. УМНЫЙ СБОРЩИК ГЛОБАЛЬНОГО СЛОВАРЯ (С ПРИОРИТЕТАМИ И БЕЗ ДУБЛИКАТОВ)
    function getGlobalDictionary() {
        const allWords = [];
        const seen = new Set(); 

        function addWord(item) {
            const icon = item.e || item.i || '';
            const key = item.w.toLowerCase() + '_' + icon;
            
            if (!seen.has(key)) {
                seen.add(key);
                allWords.push(item);
            }
        }

        Object.values(vocabularyData).forEach(arr => arr.forEach(addWord));
        pronounsData.forEach(addWord);
        Object.values(vowelsData).forEach(group => group.data.forEach(l => l.tones.forEach(addWord)));
        Object.values(consonantsData).forEach(group => group.data.forEach(l => l.tones.forEach(addWord)));

        return allWords;
    }

    function play(text, btn) {
        if(btn) btn.classList.add('playing');
        
        if (tg && tg.HapticFeedback && tg.HapticFeedback.impactOccurred) {
            tg.HapticFeedback.impactOccurred('light');
        }
        
        if(btn) setTimeout(() => btn.classList.remove('playing'), 200);
        
        if (!isUnlocked) { 
            try {
                globalAudio.play().catch(() => {});
            } catch(e){} 
            isUnlocked = true; 
        }
        
        let cleanText = text.replace(/\s*\(.*?\)\s*/g, ' ').trim();
        
        let filename = '';
        if (cleanText === 'áh') {
            filename = 'am_a_ngan';
        } else if (cleanText === 'ớ') {
            filename = 'am_a_mu';
        } else if (cleanText === 'Ý') {
            filename = 'am_y_dai';
        } else {
            cleanText = cleanText.toLowerCase();
            let encoded = encodeURIComponent(cleanText);
            let safeName = encoded.replace(/%/g, '_').replace(/[^a-z0-9_]/gi, '_');
            filename = safeName.replace(/_+/g, '_').replace(/^_|_$/g, '');
        }

        globalAudio.src = `./audio_0.75/${filename}.mp3`;
        globalAudio.playbackRate = currentPlaybackSpeed; 
        
        globalAudio.play().catch(e => {
            console.error(`❌ Ошибка воспроизведения файла ./audio_0.75/${filename}.mp3`, e);
        });
    }

    const mainContainer = document.getElementById('grids-container');

    // === ТРЕНАЖЕР СЛОВ ===
    let trainerLeft = [];
    let trainerRight = [];
    let tSelectedLeft = -1;
    let tSelectedRight = -1;
    let tIsAnimating = false;

    function getRandomWord(excludeWords = []) {
        const all = getGlobalDictionary();
        const available = all.filter(item => !excludeWords.includes(item.w));
        if (available.length === 0) return all[Math.floor(Math.random() * all.length)];
        return available[Math.floor(Math.random() * available.length)];
    }

    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function initTrainerData() {
        const allWords = getGlobalDictionary();
        let shuffled = shuffleArray([...allWords]);
        let selected = shuffled.slice(0, 6);
        
        trainerLeft = [...selected];
        trainerRight = shuffleArray([...selected]);
    }

    function renderTrainerSection() {
        mainContainer.innerHTML = '';
        mainContainer.classList.remove('animate-fade-in');
        void mainContainer.offsetWidth;
        mainContainer.classList.add('animate-fade-in');

        const header = document.createElement('div');
        header.className = 'flex justify-between items-center w-full mb-6 mt-2 border-b-2 border-tg-hint/20 pb-2';
        header.innerHTML = `
            <div class="font-bold text-tg-primary uppercase tracking-widest text-sm flex items-center gap-2">
                🎮 ${currentLang === 'ru' ? 'Тренажер слов' : 'Word Trainer'}
            </div>
            <button class="bg-tg-hint/10 border border-tg-hint/20 text-tg-text px-3 py-1.5 rounded-lg text-xs font-bold active:scale-95 transition-transform flex items-center gap-1 shadow-sm" onclick="trainerReroll()">
                🎲 ${currentLang === 'ru' ? 'Обновить' : 'Reroll'}
            </button>
        `;
        mainContainer.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-2 gap-3 w-full';
        
        const leftCol = document.createElement('div');
        leftCol.className = 'flex flex-col gap-3';
        leftCol.id = 'trainer-left-col';

        const rightCol = document.createElement('div');

        grid.appendChild(leftCol);

        mainContainer.appendChild(grid);

        if (trainerLeft.length === 0) {
            initTrainerData();

        drawTrainerColumns();

    function getTrainerBtnClass(side, index) {
        let base = 'bg-tg-secondaryBg border-2 border-tg-hint/20 rounded-xl p-3 min-h-[72px] flex items-center justify-center shadow-sm transition-all duration-300 w-full overflow-hidden active:scale-95';
        let isSelected = (side === 'left' && tSelectedLeft === index) || (side === 'right' && tSelectedRight === index);
        
        if (isSelected) {
            base += ' border-tg-primary bg-tg-primary/10 text-tg-primary';
        } else {
            base += ' text-tg-text';
        }
        return base;
    }

    function updateTrainerBtnContent(side, i) {
        const btn = document.getElementById(`t-${side}-${i}`);
        if (!btn) return;
        
        if (side === 'left') {
            btn.innerHTML = `<span class="font-black text-lg text-center leading-tight">${trainerLeft[i].w}</span>`;
        } else {
            let iconContent = '';
            if (trainerRight[i].e) {
                iconContent = trainerRight[i].e;
            } else if (trainerRight[i].isSvg) {
                iconContent = `<span class="icon-wrap w-5 h-5 inline-block align-middle">${trainerRight[i].i}</span>`;
            } else {
                iconContent = trainerRight[i].i;
            }
            const transText = trainerRight[i].t[currentLang] || trainerRight[i].t['en'];
            btn.innerHTML = `<div class="flex items-center gap-2 w-full"><span class="text-xl shrink-0 flex items-center justify-center">${iconContent}</span><span class="text-[0.8rem] font-bold text-left leading-tight line-clamp-2">${transText}</span></div>`;
        }
    }

    function drawTrainerColumns() {
        const leftCol = document.getElementById('trainer-left-col');
        const rightCol = document.getElementById('trainer-right-col');
        if (!leftCol || !rightCol) return;

        leftCol.innerHTML = '';
        rightCol.innerHTML = '';

        for(let i = 0; i < 6; i++) {
            const lBtn = document.createElement('button');
            lBtn.id = `t-left-${i}`;
            lBtn.className = getTrainerBtnClass('left', i);
            lBtn.onclick = () => handleTrainerClick('left', i);
            leftCol.appendChild(lBtn);
            updateTrainerBtnContent('left', i);

            const rBtn = document.createElement('button');
            rBtn.id = `t-right-${i}`;
            rBtn.className = getTrainerBtnClass('right', i);
            rBtn.onclick = () => handleTrainerClick('right', i);
            rightCol.appendChild(rBtn);
            updateTrainerBtnContent('right', i);
        }
    }

    function handleTrainerClick(side, index) {
        // Убрали проверку tIsAnimating! Теперь глобальной паузы нет.
        
        // Если кнопка в данный момент исчезает (зеленая или красная), игнорируем клик по ней
        const clickedBtn = document.getElementById(`t-${side}-${index}`);
        if (clickedBtn && clickedBtn.disabled) return;

        if (side === 'left') {
            if (tSelectedLeft === index) {
                tSelectedLeft = -1; 
            } else {
                tSelectedLeft = index;
                play(trainerLeft[index].w, null); // Звук воспроизводится мгновенно
            }
        } else {
            if (tSelectedRight === index) {
                tSelectedRight = -1;
            } else {
                tSelectedRight = index;
            }
        }

        // Обновляем визуальное выделение (рамки), НО не трогаем те кнопки, которые уже анимируются
        for (let i = 0; i < 5; i++) { // Учитываем 5 карточек!
            const lBtn = document.getElementById(`t-left-${i}`);
            const rBtn = document.getElementById(`t-right-${i}`);
            if (lBtn && !lBtn.disabled) lBtn.className = getTrainerBtnClass('left', i);
            if (rBtn && !rBtn.disabled) rBtn.className = getTrainerBtnClass('right', i);
        }

        if (tSelectedLeft !== -1 && tSelectedRight !== -1) {
            checkTrainerMatch();
        }
    }

    function checkTrainerMatch() {
        const lIndex = tSelectedLeft;
        const rIndex = tSelectedRight;
        
        const lWord = trainerLeft[lIndex].w;
        const rWord = trainerRight[rIndex].w;

        const lBtn = document.getElementById(`t-left-${lIndex}`);
        const rBtn = document.getElementById(`t-right-${rIndex}`);

        // СРАЗУ сбрасываем выбор! Это позволяет мгновенно кликать на другие слова.
        tSelectedLeft = -1;
        tSelectedRight = -1;

        if (lWord === rWord) {
            // Блокируем ИМЕННО ЭТУ пару кнопок, чтобы по ним нельзя было кликнуть во время анимации
            lBtn.disabled = true;
            rBtn.disabled = true;

            lBtn.className = 'bg-green-500/20 border-2 border-green-500 text-green-500 rounded-xl p-3 min-h-[72px] flex items-center justify-center shadow-sm transition-all duration-500 w-full overflow-hidden scale-[1.02]';
            rBtn.className = 'bg-green-500/20 border-2 border-green-500 text-green-500 rounded-xl p-3 min-h-[72px] flex items-center justify-center shadow-sm transition-all duration-500 w-full overflow-hidden scale-[1.02]';
            
            if (tg && tg.HapticFeedback && tg.HapticFeedback.notificationOccurred) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            setTimeout(() => {
                lBtn.style.opacity = '0';
                lBtn.style.transform = 'scale(0.8)';
                rBtn.style.opacity = '0';
                rBtn.style.transform = 'scale(0.8)';
                
                setTimeout(() => {
                    const currentWordsOnScreen = [...trainerLeft.map(i => i.w)];
                    const newWord = getRandomWord(currentWordsOnScreen);
                    
                    trainerLeft[lIndex] = newWord;
                    trainerRight[rIndex] = newWord;
                    
                    updateTrainerBtnContent('left', lIndex);
                    updateTrainerBtnContent('right', rIndex);
                    
                    lBtn.className = getTrainerBtnClass('left', lIndex);
                    rBtn.className = getTrainerBtnClass('right', rIndex);
                    
                    void lBtn.offsetWidth;
                    void rBtn.offsetWidth;
                    
                    lBtn.style.opacity = '1';
                    lBtn.style.transform = 'scale(1)';
                    rBtn.style.opacity = '1';
                    rBtn.style.transform = 'scale(1)';
                    
                    setTimeout(() => {
                        lBtn.style = '';
                        rBtn.style = '';
                        // После появления новых слов, разблокируем кнопки
                        lBtn.disabled = false;
                        rBtn.disabled = false;
                    }, 500);
                }, 500);
            }, 800);

        } else {
            // Если ошибка, тоже блокируем только эти две карточки на время "тряски" (0.5 сек)
            lBtn.disabled = true;
            rBtn.disabled = true;

            lBtn.className = 'bg-red-500/20 border-2 border-red-500 text-red-500 rounded-xl p-3 min-h-[72px] flex items-center justify-center shadow-sm transition-all w-full overflow-hidden shake-anim';
            rBtn.className = 'bg-red-500/20 border-2 border-red-500 text-red-500 rounded-xl p-3 min-h-[72px] flex items-center justify-center shadow-sm transition-all w-full overflow-hidden shake-anim';
            
            if (tg && tg.HapticFeedback && tg.HapticFeedback.notificationOccurred) {
                tg.HapticFeedback.notificationOccurred('error');
            }

            setTimeout(() => {
                lBtn.className = getTrainerBtnClass('left', lIndex);
                rBtn.className = getTrainerBtnClass('right', rIndex);
                lBtn.disabled = false;
                rBtn.disabled = false;
            }, 500);
        }
    }

    function trainerReroll() {
        if (tIsAnimating) return;
        initTrainerData();
        tSelectedLeft = -1;
        tSelectedRight = -1;
        renderTrainerSection();
    }

    function updateTrainerUI() {
        const trainerBox = document.getElementById('trainer-box');
        if (!trainerBox) return;

        const currentHeight = trainerBox.offsetHeight;
        if (currentHeight > 0) {
            trainerBox.style.minHeight = currentHeight + 'px';
        }

        let speakerHtml = `<div class="flex flex-col gap-1.5">
            <span class="text-xs font-bold text-tg-hint uppercase tracking-wider">${uiLabels[currentLang].speakerLabel}</span>
            <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">`;
        
        pronounsData.forEach(item => {
            const isSelected = selectedSpeaker === item.w;
            const btnClass = isSelected 
                ? 'bg-tg-primary text-tg-primaryText font-bold' 
                : 'bg-tg-bg text-tg-text border border-tg-hint/10';
            speakerHtml += `<button class="px-3.5 py-2 rounded-xl text-sm whitespace-nowrap active:scale-95 transition-transform ${btnClass}" onclick="setSpeaker('${item.w}')">${item.e} ${item.w}</button>`;
        });
        speakerHtml += `</div></div>`;

        let listenerHtml = `<div class="flex flex-col gap-1.5">
            <span class="text-xs font-bold text-tg-hint uppercase tracking-wider">${uiLabels[currentLang].listenerLabel}</span>
            <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">`;

        const allowed = allowedListeners[selectedSpeaker] || [];
        pronounsData.forEach(item => {
            if (!allowed.includes(item.w)) return;
            
            const isSelected = selectedListener === item.w;
            const btnClass = isSelected 
                ? 'bg-tg-primary text-tg-primaryText font-bold' 
                : 'bg-tg-bg text-tg-text border border-tg-hint/10';
            listenerHtml += `<button class="px-3.5 py-2 rounded-xl text-sm whitespace-nowrap active:scale-95 transition-transform ${btnClass}" onclick="setListener('${item.w}')">${item.e} ${item.w}</button>`;
        });
        listenerHtml += `</div></div>`;

        const spkObj = pronounsData.find(p => p.w === selectedSpeaker);
        const lstObj = pronounsData.find(p => p.w === selectedListener);

        let finalPhrase = "";
        let descRu = "";
        let descEn = "";

        if (selectedListener === 'bạn') {
            finalPhrase = "Chào bạn.";
            descRu = "Привет, друг. (Общение равных по статусу)";
            descEn = "Hi, friend. (Equal status greeting)";
        } else if (lstObj.level > spkObj.level || ['cô', 'chú', 'mẹ', 'ba', 'bà', 'ông', 'thầy'].includes(selectedListener)) {
            finalPhrase = `Dạ, ${selectedSpeaker} chào ${selectedListener} ạ.`;
            descRu = `Здравствуйте! (Уважительно, с "Dạ" и "ạ" от: ${spkObj.t.ru})`;
            descEn = `Hello! (Polite respectful form with "Dạ" and "ạ", by: ${spkObj.t.en})`;
        } else {
            finalPhrase = `Chào ${selectedListener} nha.`;
            descRu = `Привет. (Дружелюбно от старшего к младшему: ${lstObj.t.ru})`;
            descEn = `Hi/Hello. (Friendly from older to younger: ${lstObj.t.en})`;
        }

        if (selectedSpeaker === selectedListener) {
            finalPhrase = `Chào ${selectedListener}.`;
            descRu = `Привет. (Обращение к человеку равного возраста/статуса)`;
            descEn = `Hello. (Speaking to someone of the identical role)`;
        }

        const resultDisplayHtml = `
            <div class="mt-2 p-4 bg-tg-bg rounded-xl border border-tg-hint/10 text-center flex flex-col items-center gap-2">
                <div class="text-2xl font-black text-tg-primary tracking-wide mb-1">${finalPhrase}</div>
                <div class="text-xs text-tg-text font-medium">${currentLang === 'ru' ? descRu : descEn}</div>
                <button class="mt-3 bg-tg-primary text-tg-primaryText font-bold px-6 py-2.5 rounded-xl text-sm w-full sm:w-auto active:scale-95 transition-transform shadow-sm" onclick="play('${finalPhrase}', this)">
                    🔊 ${currentLang === 'ru' ? 'Прослушать фразу' : 'Listen to phrase'}
                </button>
            </div>
        `;

        trainerBox.innerHTML = speakerHtml + listenerHtml + resultDisplayHtml;

        setTimeout(() => {
            trainerBox.style.minHeight = 'auto';
        }, 10);
    }

    window.navigateVocabPage = function(direction) {
        const currentData = vocabularyData[currentVocabTab];
        const isMobile = window.innerWidth < 640;
        const pageSize = isMobile ? 7 : 10;
        const totalPages = Math.ceil(currentData.length / pageSize);

        const nextPageIndex = vocabPageIndex + direction;
        if (nextPageIndex >= 0 && nextPageIndex < totalPages) {
            vocabPageIndex = nextPageIndex;
            renderVocabPageOnly();
        }
    };

    function handleGesture() {
        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;
        const minSwipe = 50;

        if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > minSwipe) {
            if (diffX < 0) {
                navigateVocabPage(1);
            } else {
                navigateVocabPage(-1);
            }
        }
    }

                <svg class="w-4 h-4 text-tg-hint" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <input type="text" id="vocab-search" class="w-full bg-tg-bg border border-tg-hint/20 text-tg-text rounded-2xl pl-10 pr-10 py-2 outline-none focus:border-tg-primary focus:ring-1 focus:ring-tg-primary transition-all text-sm" placeholder="${uiLabels[currentLang].searchPlaceholder}">
            <button id="clear-search" class="absolute inset-y-0 right-0 pr-4 flex items-center hidden active:scale-90 transition-transform">
                <svg class="w-5 h-5 text-tg-hint hover:text-tg-text transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        `;

        const pageContainer = document.createElement('div');
        pageContainer.id = 'vocab-page-container';
        pageContainer.className = 'w-full';
        mainContainer.appendChild(pageContainer);

        const searchInput = document.getElementById('vocab-search');
        const clearBtn = document.getElementById('clear-search');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            
            if (query.length > 0) {
                clearBtn.classList.remove('hidden');
                
                const allWords = getGlobalDictionary();
                const filtered = allWords.filter(item => {
                    const wordVi = item.w.toLowerCase();
                    const transRu = item.t.ru ? item.t.ru.toLowerCase() : '';
                    const transEn = item.t.en ? item.t.en.toLowerCase() : '';
                    return wordVi.includes(query) || transRu.includes(query) || transEn.includes(query);
                });
                
                renderVocabPageOnly(filtered); 
            } else {
                clearBtn.classList.add('hidden');
                renderVocabPageOnly(); 
            }

            searchInput.value = '';

            renderVocabPageOnly();

        renderVocabPageOnly();

    function renderVocabPageOnly(filteredData = null) {
        const pageContainer = document.getElementById('vocab-page-container');
        if (!pageContainer) return;

        pageContainer.innerHTML = '';
        
        if (!filteredData) {
            pageContainer.classList.remove('animate-fade-in');
            void pageContainer.offsetWidth;
            pageContainer.classList.add('animate-fade-in');
        }

        const vocabGrid = document.createElement('div');
        vocabGrid.className = 'grid grid-cols-1 sm:grid-cols-2 gap-2.5 w-full pb-2 touch-pan-y';
        
        let itemsToRender = [];
        let showPagination = false;
        let totalPages = 1;

        if (filteredData) {
            itemsToRender = filteredData;
            
            if (itemsToRender.length === 0) {
                vocabGrid.innerHTML = `
                    <div class="col-span-1 sm:col-span-2 text-center text-tg-hint py-8 text-sm">
                        ${currentLang === 'ru' ? 'Ничего не найдено 😕' : 'Nothing found 😕'}
                    </div>
                `;
            }
        } else {
            const currentData = vocabularyData[currentVocabTab];
            const isMobile = window.innerWidth < 640;
            const pageSize = isMobile ? 7 : 10;
            totalPages = Math.ceil(currentData.length / pageSize);
            
            if (vocabPageIndex >= totalPages) vocabPageIndex = 0;
            
            itemsToRender = currentData.slice(vocabPageIndex * pageSize, (vocabPageIndex + 1) * pageSize);
            showPagination = totalPages > 1;
        }
        
        itemsToRender.forEach(item => {
            const rowBtn = document.createElement('button');
            rowBtn.className = 'bg-tg-secondaryBg rounded-xl p-3 flex items-center justify-between shadow-sm active:scale-95 transition-transform border border-tg-hint/10 w-full text-left';
            
            const translation = item.t[currentLang] || item.t['en'];
            
            let iconContent = '';
            if (item.e) {
                iconContent = item.e;
            } else if (item.isSvg) {
                iconContent = `<span class="icon-wrap w-6 h-6 flex items-center justify-center">${item.i}</span>`;
            } else {
                iconContent = item.i;
            }
            
            rowBtn.innerHTML = `
                <div class="flex items-center gap-3 overflow-hidden">
                    <span class="text-2xl shrink-0 flex items-center justify-center w-8 h-8">${iconContent}</span>
                    <div class="flex flex-col overflow-hidden justify-center">
                        <span class="font-black text-[1.05rem] text-tg-text truncate leading-tight">${item.w}</span>
                        <span class="text-[0.75rem] text-tg-hint truncate mt-0.5 leading-tight">${translation}</span>
                    </div>
                </div>
            `;
            
            rowBtn.onclick = () => play(item.w, rowBtn);
            vocabGrid.appendChild(rowBtn);
        });

        if (!filteredData) {
            vocabGrid.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            vocabGrid.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                touchEndY = e.changedTouches[0].screenY;
                handleGesture();
            }, { passive: true });
        }

        pageContainer.appendChild(vocabGrid);

        if (showPagination) {
            const paginationControls = document.createElement('div');
            paginationControls.className = 'flex items-center justify-center gap-4 mt-6 mb-8 w-full select-none';

            const prevBtn = document.createElement('button');
            prevBtn.className = `p-2 rounded-xl border border-tg-hint/20 text-tg-text active:scale-95 transition-all ${vocabPageIndex === 0 ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            prevBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>`;
            prevBtn.onclick = () => navigateVocabPage(-1);

            const dotsContainer = document.createElement('div');
            dotsContainer.className = 'flex items-center gap-2';
            for (let i = 0; i < totalPages; i++) {
                const dot = document.createElement('button');
                const isActive = i === vocabPageIndex;
                dot.className = `w-2.5 h-2.5 rounded-full transition-all duration-300 ${isActive ? 'bg-tg-primary w-5' : 'bg-tg-hint/30'}`;
                dot.onclick = () => {
                    vocabPageIndex = i;
                    renderVocabPageOnly();
                };
                dotsContainer.appendChild(dot);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = `p-2 rounded-xl border border-tg-hint/20 text-tg-text active:scale-95 transition-all ${vocabPageIndex === totalPages - 1 ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            nextBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>`;
            nextBtn.onclick = () => navigateVocabPage(1);

            paginationControls.appendChild(prevBtn);
            paginationControls.appendChild(dotsContainer);
            paginationControls.appendChild(nextBtn);
            pageContainer.appendChild(paginationControls);
        }
    }

    window.setSpeaker = function(speaker) {
        selectedSpeaker = speaker;
        const allowed = allowedListeners[speaker] || [];
        if (!allowed.includes(selectedListener)) {
            selectedListener = allowed[0] || 'con';
        }
        updateTrainerUI();
    };

    window.setListener = function(listener) {
        selectedListener = listener;
        updateTrainerUI();
    };

    function updateLanguageUI() {
        const langBtn = document.getElementById('lang-toggle');
        const vowelsBtn = document.getElementById('tab-vowels');
        const consonantsBtn = document.getElementById('tab-consonants');
        const pronounsBtn = document.getElementById('tab-pronouns');
        const vocabBtn = document.getElementById('tab-vocabulary');
        const subTitle = document.getElementById('sub-title');

        langBtn.innerText = currentLang === 'ru' ? 'EN' : 'RU';
        vowelsBtn.innerText = uiLabels[currentLang].vowels;
        consonantsBtn.innerText = uiLabels[currentLang].consonants;
        pronounsBtn.innerText = uiLabels[currentLang].pronouns;
        vocabBtn.innerText = uiLabels[currentLang].vocabulary;
        subTitle.innerText = uiLabels[currentLang].subtitle;
        
        if (currentTab === 'vocabulary') {
            renderVocabularySection();
        } else if (currentTab === 'trainer') {
            renderTrainerSection();
        }
    }

    function toggleLanguage() {
        currentLang = currentLang === 'ru' ? 'en' : 'ru';
        updateLanguageUI();
        if (currentTab === 'vowels') renderGrids(vowelsData);
        else if (currentTab === 'consonants') renderGrids(consonantsData);
        else if (currentTab === 'pronouns') renderPronounsSection();
    }

    function switchTab(tabName) {
        currentTab = tabName;
        const btnVowels = document.getElementById('tab-vowels');
        const btnConsonants = document.getElementById('tab-consonants');
        const btnPronouns = document.getElementById('tab-pronouns');
        const btnVocab = document.getElementById('tab-vocabulary');
        const btnTrainer = document.getElementById('trainer-toggle');
        
        const activeClass = ['bg-tg-primary', 'text-tg-primaryText', 'shadow-sm'];
        const inactiveClass = ['text-tg-text', 'bg-transparent'];

        [btnVowels, btnConsonants, btnPronouns, btnVocab].forEach(btn => {
            btn.classList.remove(...activeClass);
            btn.classList.add(...inactiveClass);
        });
        
        btnTrainer.classList.remove('bg-tg-primary', 'text-tg-primaryText');
        btnTrainer.classList.add('bg-tg-hint/10', 'text-tg-text');

        if (tabName === 'vowels') {
            btnVowels.classList.add(...activeClass);
            btnVowels.classList.remove(...inactiveClass);
            renderGrids(vowelsData);
        } else if (tabName === 'consonants') {
            btnConsonants.classList.add(...activeClass);
            btnConsonants.classList.remove(...inactiveClass);
            renderGrids(consonantsData);
        } else if (tabName === 'pronouns') {
            btnPronouns.classList.add(...activeClass);
            btnPronouns.classList.remove(...inactiveClass);
            renderPronounsSection();
        } else if (tabName === 'vocabulary') {
            btnVocab.classList.add(...activeClass);
            btnVocab.classList.remove(...inactiveClass);
            vocabPageIndex = 0; 
            renderVocabularySection();
        } else if (tabName === 'trainer') {
            btnTrainer.classList.remove('bg-tg-hint/10', 'text-tg-text');
            btnTrainer.classList.add('bg-tg-primary', 'text-tg-primaryText');
            renderTrainerSection();
        }
    }

    function applyTheme(theme) {
        currentTheme = theme;
        const root = document.documentElement;
        
        const palettes = {
            light: {
                '--tg-theme-bg-color': '#f0f4f8',
                '--tg-theme-text-color': '#2c3e50',
                '--tg-theme-hint-color': '#7f8c8d',
                '--tg-theme-button-color': '#1976d2',
                '--tg-theme-button-text-color': '#ffffff',
                '--tg-theme-secondary-bg-color': '#ffffff'
            },
            dark: {
                '--tg-theme-bg-color': '#151f2b',
                '--tg-theme-text-color': '#f5f6f7',
                '--tg-theme-hint-color': '#7e8b9a',
                '--tg-theme-button-color': '#2481cc',
                '--tg-theme-button-text-color': '#ffffff',
                '--tg-theme-secondary-bg-color': '#1d2733'
            }
        };

        const colors = palettes[theme];
        for (const [key, val] of Object.entries(colors)) {
            root.style.setProperty(key, val);
        }
        
        localStorage.setItem('app-theme', theme);
        updateThemeIcon();
    }

    function updateThemeIcon() {
        const btn = document.getElementById('theme-toggle');
        if (!btn) return;

        if (currentTheme === 'dark') {
            btn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V21M4.22 4.22l1.59 1.59m12.38 12.38l1.59 1.59M21 12h-2.25m-13.5 0H3m16.28-7.78l-1.59 1.59M5.81 18.19l-1.59 1.59M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
            `;
        } else {
            btn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                </svg>
            `;
        }
    }

    window.toggleTheme = function() {
        const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
        applyTheme(nextTheme);
    };

    let lastWidth = window.innerWidth;
    window.addEventListener('DOMContentLoaded', () => {
        const currentCacheKey = `audio-offline-ready-${APP_VERSION}`;
        
        // Очищаем старые версии флагов из памяти
        Object.keys(localStorage).forEach(key => {
            if (key.startsWith('audio-offline-ready-') && key !== currentCacheKey) {
                localStorage.removeItem(key);
            }
        });

        // Проверяем скачана ли текущая версия
        if (localStorage.getItem(currentCacheKey) === 'true') {
            const btn = document.getElementById('download-all-btn');
            const icon = document.getElementById('download-icon');
            const check = document.getElementById('download-check');
            
            if (btn && icon && check) {
                icon.classList.add('hidden');
                check.classList.remove('hidden');
                btn.disabled = true;
            }
        }
    });

    let savedTheme = localStorage.getItem('app-theme');
    if (!savedTheme) {
        if (tg && tg.colorScheme) {
            savedTheme = tg.colorScheme;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            savedTheme = 'dark';
        } else {
            savedTheme = 'light';
        }
    }
    applyTheme(savedTheme);

    updateLanguageUI();
    renderGrids(vowelsData);

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => {
                    console.log('Service Worker registered', reg);
                })
                .catch(err => console.error('Service Worker registration failed', err));
        });

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) {
                window.location.reload();
                refreshing = true;
            }
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('audio-offline-ready') === 'true') {
            const btn = document.getElementById('download-all-btn');
            const icon = document.getElementById('download-icon');
            const check = document.getElementById('download-check');
            
            if (btn && icon && check) {
                icon.classList.add('hidden');
                check.classList.remove('hidden');
                btn.disabled = true;
            }
        }
    });

    async function downloadAllAudio() {
        const btn = document.getElementById('download-all-btn');
        const icon = document.getElementById('download-icon');
        const spinner = document.getElementById('download-spinner');
        const check = document.getElementById('download-check');

        btn.disabled = true;
        icon.classList.add('hidden');
        spinner.classList.remove('hidden');

        try {
            const allWords = new Set();

            if (typeof vowelsData !== 'undefined') {
                Object.values(vowelsData).forEach(g => g.data.forEach(d => d.tones.forEach(t => allWords.add(t.w))));
            }
            if (typeof consonantsData !== 'undefined') {
                Object.values(consonantsData).forEach(g => g.data.forEach(d => d.tones.forEach(t => allWords.add(t.w))));
            }
            if (typeof pronounsData !== 'undefined') {
                pronounsData.forEach(item => allWords.add(item.w));
            }
            if (typeof vocabularyData !== 'undefined') {
                Object.values(vocabularyData).forEach(arr => arr.forEach(item => allWords.add(item.w)));
            }
            if (typeof globalDictionary !== 'undefined' && globalDictionary.length > 0) {
                globalDictionary.forEach(item => allWords.add(item.w));
            }

            const urlsToFetch = [];
            
            allWords.forEach(word => {
                let cleanText = word.toLowerCase();
                let encoded = encodeURIComponent(cleanText);
                let safeName = encoded.replace(/%/g, '_').replace(/[^a-z0-9_]/gi, '_');
                let filename = safeName.replace(/_+/g, '_').replace(/^_|_$/g, '');
                
                urlsToFetch.push(`./audio_0.75/${filename}.mp3`);
            });

            const batchSize = 15; 
            for (let i = 0; i < urlsToFetch.length; i += batchSize) {
                const batch = urlsToFetch.slice(i, i + batchSize);
                await Promise.all(batch.map(url => fetch(url).catch(e => console.log('Fetch skipped:', url))));
            }

            // Сохраняем флаг УСПЕХА для конкретной версии
            localStorage.setItem(`audio-offline-ready-${APP_VERSION}`, 'true');

            spinner.classList.add('hidden');
            check.classList.remove('hidden');

        } catch (error) {
            console.error('Ошибка при скачивании базы:', error);
            alert('Не удалось скачать аудио. Проверьте подключение к интернету.');
            
            spinner.classList.add('hidden');
            icon.classList.remove('hidden');
            btn.disabled = false;
        }
    }
</script>
