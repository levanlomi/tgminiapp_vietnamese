<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>Học tiếng Việt — Learn & Practice</title>
    
    <!-- Подключение Manifest для PWA -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Чиним вывод звука в браузере из сети (скрываем Referer для Google) -->
    <meta name="referrer" content="no-referrer">

    <!-- Теги для поддержки PWA на iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tg: {
                            bg: 'var(--tg-theme-bg-color, #f0f4f8)',
                            text: 'var(--tg-theme-text-color, #2c3e50)',
                            hint: 'var(--tg-theme-hint-color, #7f8c8d)',
                            primary: 'var(--tg-theme-button-color, #1976d2)',
                            primaryText: 'var(--tg-theme-button-text-color, #ffffff)',
                            secondaryBg: 'var(--tg-theme-secondary-bg-color, #ffffff)',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.25s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: var(--tg-theme-bg-color, #f0f4f8);
            color: var(--tg-theme-text-color, #2c3e50);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .playing {
            transform: scale(0.92) !important;
            opacity: 0.8;
            border-color: var(--tg-theme-button-color, #1976d2) !important;
            background-color: var(--tg-theme-button-color, #1976d2) !important;
            color: var(--tg-theme-button-text-color, #ffffff) !important;
        }

        .icon-wrap svg { 
            width: 100%; 
            height: 100%; 
            fill: currentColor; 
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center transition-colors duration-300">

<div class="w-full max-w-screen-md relative">
    <!-- Контейнер для кнопок управления в правом верхнем углу -->
    <div class="absolute top-1 right-0 flex items-center gap-1.5">
        <button id="lang-toggle" class="bg-tg-hint/10 border border-tg-hint/20 text-tg-text font-black px-3 py-1.5 rounded-xl text-xs uppercase active:scale-95 transition-transform" onclick="toggleLanguage()">
            RU
        </button>
        <button id="theme-toggle" class="bg-tg-hint/10 border border-tg-hint/20 text-tg-text p-1.5 rounded-xl active:scale-95 transition-transform" onclick="toggleTheme()">

        </button>
    </div>

    <header class="text-center mb-4 mt-2">

        <p id="sub-title" class="text-tg-hint text-sm mt-0.5 font-medium transition-colors"></p>
    </header>

    <div class="flex bg-tg-hint/10 p-1 rounded-xl mb-6 border border-tg-hint/20 w-full overflow-x-auto no-scrollbar">

            Гласные

            Словарь
        </button>
    </div>
    
    <div id="grids-container" class="w-full"></div>

    function play(text, btn) {
        if(btn) btn.classList.add('playing');
        
        if (tg && tg.HapticFeedback && tg.HapticFeedback.impactOccurred) {
            tg.HapticFeedback.impactOccurred('light');
        }
        
        if(btn) setTimeout(() => btn.classList.remove('playing'), 200);
        
        if (!isUnlocked) { 
            try {
                globalAudio.play().catch(() => {});
            } catch(e){} 
            isUnlocked = true; 
        }
        
        // Очищаем текст от скобок перед отправкой в TTS
        let cleanText = text.replace(/\s*\(.*?\)\s*/g, ' ').trim();
        
        // Специальная замена для фонетических тестов гласных
        if (cleanText === 'áh') cleanText = 'á'; 
        if (cleanText === 'ớ') cleanText = 'ớ';  
        
        // Прямой сетевой запрос к Google Translate TTS
        let query = cleanText + '.';
        if (cleanText === 'áh') query = 'á '; 
        if (cleanText === 'ớ') query = 'ớ ';  
        
        globalAudio.src = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(query)}&tl=vi&client=tw-ob`;
        globalAudio.play().catch(e => console.error('Audio playback error:', e));
    }

    // Предварительная загрузка голосов (требуется для некоторых браузеров на Chrome/Android)
    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
    }

    const mainContainer = document.getElementById('grids-container');

    function renderGrids(dataObj) {
        mainContainer.innerHTML = '';
        mainContainer.classList.remove('animate-fade-in');
        void mainContainer.offsetWidth;
        mainContainer.classList.add('animate-fade-in');

        Object.keys(dataObj).forEach(key => {
            const group = dataObj[key];
            
            const titleDiv = document.createElement('div');
            titleDiv.className = 'w-full mt-2 mb-4 font-bold text-tg-hint uppercase tracking-widest border-b-2 border-tg-hint/20 pb-1 text-sm';
            titleDiv.innerText = group.title;
            mainContainer.appendChild(titleDiv);
            
            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6';
            
            group.data.forEach(cardData => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'bg-tg-secondaryBg rounded-2xl p-4 shadow-sm border-t-4 border-tg-primary flex flex-col transition-colors duration-300';
                
                cardDiv.innerHTML = `<button class="bg-tg-primary text-tg-primaryText rounded-xl text-[2.2rem] font-black py-3 mb-4 w-full transition-transform active:scale-95" onclick="play('${cardData.sound}', this)">${cardData.title}</button>`;
                
                const tonesGroup = document.createElement('div');
                tonesGroup.className = 'grid grid-cols-2 gap-2';
                
                cardData.tones.forEach(tone => {
                    const tBtn = document.createElement('button');
                    tBtn.className = 'bg-tg-bg border border-tg-hint/20 rounded-xl p-2.5 flex flex-col items-center transition-all active:scale-95 active:border-tg-primary';
                    
                    const translatedText = tone.t[currentLang] || tone.t['en'];
                    const iconContent = tone.isSvg ? tone.i : tone.i;
                    
                    tBtn.innerHTML = `
                        <span class="icon-wrap text-2xl mb-1 flex items-center justify-center w-6 h-6">${iconContent}</span>
                        <span class="text-[1.15rem] font-bold text-tg-text leading-tight">${tone.w}</span>
                        <span class="text-[0.7rem] text-tg-hint text-center leading-tight mt-1">${translatedText}</span>
                    `;
                    tBtn.onclick = () => play(tone.w, tBtn);
                    tonesGroup.appendChild(tBtn);
                });
                
                cardDiv.appendChild(tonesGroup);
                grid.appendChild(cardDiv);
            });
            
            mainContainer.appendChild(grid);
        });
    }

    function updateTrainerUI() {
        const trainerBox = document.getElementById('trainer-box');
        if (!trainerBox) return;

        const currentHeight = trainerBox.offsetHeight;
        if (currentHeight > 0) {
            trainerBox.style.minHeight = currentHeight + 'px';
        }

        let speakerHtml = `<div class="flex flex-col gap-1.5">
            <span class="text-xs font-bold text-tg-hint uppercase tracking-wider">${uiLabels[currentLang].speakerLabel}</span>
            <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">`;
        
        pronounsData.forEach(item => {
            const isSelected = selectedSpeaker === item.w;
            const btnClass = isSelected 
                ? 'bg-tg-primary text-tg-primaryText font-bold' 
                : 'bg-tg-bg text-tg-text border border-tg-hint/10';
            speakerHtml += `<button class="px-3.5 py-2 rounded-xl text-sm whitespace-nowrap active:scale-95 transition-transform ${btnClass}" onclick="setSpeaker('${item.w}')">${item.e} ${item.w}</button>`;
        });
        speakerHtml += `</div></div>`;

        let listenerHtml = `<div class="flex flex-col gap-1.5">
            <span class="text-xs font-bold text-tg-hint uppercase tracking-wider">${uiLabels[currentLang].listenerLabel}</span>
            <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">`;

        const allowed = allowedListeners[selectedSpeaker] || [];
        pronounsData.forEach(item => {
            if (!allowed.includes(item.w)) return;
            
            const isSelected = selectedListener === item.w;
            const btnClass = isSelected 
                ? 'bg-tg-primary text-tg-primaryText font-bold' 
                : 'bg-tg-bg text-tg-text border border-tg-hint/10';
            listenerHtml += `<button class="px-3.5 py-2 rounded-xl text-sm whitespace-nowrap active:scale-95 transition-transform ${btnClass}" onclick="setListener('${item.w}')">${item.e} ${item.w}</button>`;
        });
        listenerHtml += `</div></div>`;

        const spkObj = pronounsData.find(p => p.w === selectedSpeaker);
        const lstObj = pronounsData.find(p => p.w === selectedListener);

        let finalPhrase = "";
        let descRu = "";
        let descEn = "";

        if (selectedListener === 'bạn') {
            finalPhrase = "Chào bạn.";
            descRu = "Привет, друг. (Общение равных по статусу)";
            descEn = "Hi, friend. (Equal status greeting)";
        } else if (lstObj.level > spkObj.level || ['cô', 'chú', 'mẹ', 'ba', 'bà', 'ông', 'thầy'].includes(selectedListener)) {
            finalPhrase = `Dạ, ${selectedSpeaker} chào ${selectedListener} ạ.`;
            descRu = `Здравствуйте! (Уважительно, с "Dạ" и "ạ" от: ${spkObj.t.ru})`;
            descEn = `Hello! (Polite respectful form with "Dạ" and "ạ", by: ${spkObj.t.en})`;
        } else {
            finalPhrase = `Chào ${selectedListener} nha.`;
            descRu = `Привет. (Дружелюбно от старшего к младшему: ${lstObj.t.ru})`;
            descEn = `Hi/Hello. (Friendly from older to younger: ${lstObj.t.en})`;
        }

        if (selectedSpeaker === selectedListener) {
            finalPhrase = `Chào ${selectedListener}.`;
            descRu = `Привет. (Обращение к человеку равного возраста/статуса)`;
            descEn = `Hello. (Speaking to someone of the identical role)`;
        }

        const resultDisplayHtml = `
            <div class="mt-2 p-4 bg-tg-bg rounded-xl border border-tg-hint/10 text-center flex flex-col items-center gap-2">
                <div class="text-2xl font-black text-tg-primary tracking-wide mb-1">${finalPhrase}</div>
                <div class="text-xs text-tg-text font-medium">${currentLang === 'ru' ? descRu : descEn}</div>
                <button class="mt-3 bg-tg-primary text-tg-primaryText font-bold px-6 py-2.5 rounded-xl text-sm w-full sm:w-auto active:scale-95 transition-transform shadow-sm" onclick="play('${finalPhrase}', this)">
                    🔊 ${currentLang === 'ru' ? 'Прослушать фразу' : 'Listen to phrase'}
                </button>
            </div>
        `;

        trainerBox.innerHTML = speakerHtml + listenerHtml + resultDisplayHtml;

        setTimeout(() => {
            trainerBox.style.minHeight = 'auto';
        }, 10);
    }

        const currentData = vocabularyData[currentVocabTab];
        const isMobile = window.innerWidth < 640;
        const pageSize = isMobile ? 7 : 10;
        const totalPages = Math.ceil(currentData.length / pageSize);

        const nextPageIndex = vocabPageIndex + direction;
        if (nextPageIndex >= 0 && nextPageIndex < totalPages) {
            vocabPageIndex = nextPageIndex;
            renderVocabularySection();
        }
    };

    function handleGesture() {
        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;
        const minSwipe = 50;

        if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > minSwipe) {
            if (diffX < 0) {
                navigateVocabPage(1);
            } else {
                navigateVocabPage(-1);
            }
        }
    }

    function renderVocabularySection() {
        mainContainer.innerHTML = '';
        mainContainer.classList.remove('animate-fade-in');
        void mainContainer.offsetWidth;
        mainContainer.classList.add('animate-fade-in');

        // Меню подкатегорий словаря
        const subNav = document.createElement('div');
        subNav.className = 'flex flex-wrap justify-center gap-2 mb-6 w-full';
        
        const categories = [
            { id: 'top', label: uiLabels[currentLang].top },
            { id: 'verbs', label: uiLabels[currentLang].verbs },
            { id: 'cafe', label: uiLabels[currentLang].cafe },
            { id: 'particles', label: uiLabels[currentLang].particles },
            { id: 'numbers', label: uiLabels[currentLang].numbers },
            { id: 'phrases', label: uiLabels[currentLang].phrases }
        ];

        categories.forEach(cat => {
            const btn = document.createElement('button');
            const isActive = currentVocabTab === cat.id;
            const btnClass = isActive 
                ? 'bg-tg-primary text-tg-primaryText border-tg-primary' 
                : 'bg-transparent text-tg-text border-tg-hint/30';
            
            btn.className = `px-4 py-1.5 rounded-full text-xs sm:text-sm font-bold border transition-colors ${btnClass}`;
            btn.innerText = cat.label;
            btn.onclick = () => {
                currentVocabTab = cat.id;
                vocabPageIndex = 0; 
                renderVocabularySection();
            };
            subNav.appendChild(btn);
        });
        mainContainer.appendChild(subNav);

        // Список слов выбранной подкатегории
        const vocabGrid = document.createElement('div');
        vocabGrid.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3 w-full pb-2 touch-pan-y';
        
        const currentData = vocabularyData[currentVocabTab];
        
        // Адаптивное определение размера страницы
        const isMobile = window.innerWidth < 640;
        const pageSize = isMobile ? 7 : 10;
        const totalPages = Math.ceil(currentData.length / pageSize);

        if (vocabPageIndex >= totalPages) vocabPageIndex = 0;

        const pageItems = currentData.slice(vocabPageIndex * pageSize, (vocabPageIndex + 1) * pageSize);
        
        pageItems.forEach(item => {
            const rowBtn = document.createElement('button');
            rowBtn.className = 'bg-tg-secondaryBg rounded-xl p-3 flex items-center justify-between shadow-sm active:scale-95 transition-transform border border-tg-hint/10 w-full text-left';
            
            const translation = item.t[currentLang];
            
            rowBtn.innerHTML = `
                <div class="flex items-center gap-3 overflow-hidden">
                    <span class="text-2xl shrink-0">${item.e}</span>
                    <div class="flex flex-col overflow-hidden">
                        <span class="font-black text-[1.1rem] text-tg-text truncate">${item.w}</span>
                        <span class="text-[0.75rem] text-tg-hint truncate mt-0.5">${translation}</span>
                    </div>
                </div>
            `;
            
            rowBtn.onclick = () => play(item.w, rowBtn);
            vocabGrid.appendChild(rowBtn);
        });

        vocabGrid.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        vocabGrid.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleGesture();
        }, { passive: true });

        mainContainer.appendChild(vocabGrid);

        // Рендер панели управления пагинацией (стрелки + точки)
        if (totalPages > 1) {
            const paginationControls = document.createElement('div');
            paginationControls.className = 'flex items-center justify-center gap-4 mt-6 mb-8 w-full select-none';

            // Левая стрелка
            const prevBtn = document.createElement('button');
            prevBtn.className = `p-2 rounded-xl border border-tg-hint/20 text-tg-text active:scale-95 transition-all ${vocabPageIndex === 0 ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            prevBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>`;
            prevBtn.onclick = () => navigateVocabPage(-1);

            // Точки-индикаторы
            const dotsContainer = document.createElement('div');
            dotsContainer.className = 'flex items-center gap-2';
            for (let i = 0; i < totalPages; i++) {
                const dot = document.createElement('button');
                const isActive = i === vocabPageIndex;
                dot.className = `w-2.5 h-2.5 rounded-full transition-all duration-300 ${isActive ? 'bg-tg-primary w-5' : 'bg-tg-hint/30'}`;
                dot.onclick = () => {
                    vocabPageIndex = i;
                    renderVocabularySection();
                };
                dotsContainer.appendChild(dot);
            }

            // Правая стрелка
            const nextBtn = document.createElement('button');
            nextBtn.className = `p-2 rounded-xl border border-tg-hint/20 text-tg-text active:scale-95 transition-all ${vocabPageIndex === totalPages - 1 ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            nextBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>`;
            nextBtn.onclick = () => navigateVocabPage(1);

            paginationControls.appendChild(prevBtn);
            paginationControls.appendChild(dotsContainer);
            paginationControls.appendChild(nextBtn);
            mainContainer.appendChild(paginationControls);
        }
    }

    window.setSpeaker = function(speaker) {
        selectedSpeaker = speaker;
        const allowed = allowedListeners[speaker] || [];
        if (!allowed.includes(selectedListener)) {
            selectedListener = allowed[0] || 'con';
        }
        updateTrainerUI();
    };

    window.setListener = function(listener) {
        selectedListener = listener;
        updateTrainerUI();
    };

    function updateLanguageUI() {
        const langBtn = document.getElementById('lang-toggle');
        const vowelsBtn = document.getElementById('tab-vowels');
        const consonantsBtn = document.getElementById('tab-consonants');
        const pronounsBtn = document.getElementById('tab-pronouns');
        const vocabBtn = document.getElementById('tab-vocabulary');
        const subTitle = document.getElementById('sub-title');

        langBtn.innerText = currentLang === 'ru' ? 'EN' : 'RU';
        vowelsBtn.innerText = uiLabels[currentLang].vowels;
        consonantsBtn.innerText = uiLabels[currentLang].consonants;
        pronounsBtn.innerText = uiLabels[currentLang].pronouns;
        vocabBtn.innerText = uiLabels[currentLang].vocabulary;
        subTitle.innerText = uiLabels[currentLang].subtitle;
    }

    function toggleLanguage() {
        currentLang = currentLang === 'ru' ? 'en' : 'ru';
        updateLanguageUI();
        if (currentTab === 'vowels') renderGrids(vowelsData);
        else if (currentTab === 'consonants') renderGrids(consonantsData);
        else if (currentTab === 'pronouns') renderPronounsSection();
        else if (currentTab === 'vocabulary') renderVocabularySection();
    }

    function switchTab(tabName) {
        currentTab = tabName;
        const btnVowels = document.getElementById('tab-vowels');
        const btnConsonants = document.getElementById('tab-consonants');
        const btnPronouns = document.getElementById('tab-pronouns');
        const btnVocab = document.getElementById('tab-vocabulary');
        
        const activeClass = ['bg-tg-primary', 'text-tg-primaryText', 'shadow-sm'];
        const inactiveClass = ['text-tg-text', 'bg-transparent'];

        [btnVowels, btnConsonants, btnPronouns, btnVocab].forEach(btn => {
            btn.classList.remove(...activeClass);
            btn.classList.add(...inactiveClass);
        });

        if (tabName === 'vowels') {
            btnVowels.classList.add(...activeClass);
            btnVowels.classList.remove(...inactiveClass);
            renderGrids(vowelsData);
        } else if (tabName === 'consonants') {
            btnConsonants.classList.add(...activeClass);
            btnConsonants.classList.remove(...inactiveClass);
            renderGrids(consonantsData);
        } else if (tabName === 'pronouns') {
            btnPronouns.classList.add(...activeClass);
            btnPronouns.classList.remove(...inactiveClass);
            renderPronounsSection();
        } else if (tabName === 'vocabulary') {
            btnVocab.classList.add(...activeClass);
            btnVocab.classList.remove(...inactiveClass);
            vocabPageIndex = 0; 
            renderVocabularySection();
        }
    }

    function applyTheme(theme) {
        currentTheme = theme;
        const root = document.documentElement;
        
        const palettes = {
            light: {
                '--tg-theme-bg-color': '#f0f4f8',
                '--tg-theme-text-color': '#2c3e50',
                '--tg-theme-hint-color': '#7f8c8d',
                '--tg-theme-button-color': '#1976d2',
                '--tg-theme-button-text-color': '#ffffff',
                '--tg-theme-secondary-bg-color': '#ffffff'
            },
            dark: {
                '--tg-theme-bg-color': '#151f2b',
                '--tg-theme-text-color': '#f5f6f7',
                '--tg-theme-hint-color': '#7e8b9a',
                '--tg-theme-button-color': '#2481cc',
                '--tg-theme-button-text-color': '#ffffff',
                '--tg-theme-secondary-bg-color': '#1d2733'
            }
        };

        const colors = palettes[theme];
        for (const [key, val] of Object.entries(colors)) {
            root.style.setProperty(key, val);
        }
        
        localStorage.setItem('app-theme', theme);
        updateThemeIcon();
    }

    function updateThemeIcon() {
        const btn = document.getElementById('theme-toggle');
        if (!btn) return;

        if (currentTheme === 'dark') {
            btn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V21M4.22 4.22l1.59 1.59m12.38 12.38l1.59 1.59M21 12h-2.25m-13.5 0H3m16.28-7.78l-1.59 1.59M5.81 18.19l-1.59 1.59M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
            `;
        } else {
            btn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                </svg>
            `;
        }
    }

    window.toggleTheme = function() {
        const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
        applyTheme(nextTheme);
    };

    let lastWidth = window.innerWidth;
    window.addEventListener('resize', () => {
        const currentWidth = window.innerWidth;
        const crossedBreakpoint = (lastWidth < 640 && currentWidth >= 640) || (lastWidth >= 640 && currentWidth < 640);
        if (crossedBreakpoint) {
            lastWidth = currentWidth;
            if (currentTab === 'vocabulary') {
                renderVocabularySection();
            }
        }
    });

    let savedTheme = localStorage.getItem('app-theme');
    if (!savedTheme) {
        if (tg && tg.colorScheme) {
            savedTheme = tg.colorScheme;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            savedTheme = 'dark';
        } else {
            savedTheme = 'light';
        }
    }
    applyTheme(savedTheme);

    updateLanguageUI();
    renderGrids(vowelsData);

// Регистрация Сервис-воркера с автоматическим обновлением страницы
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => {
                    console.log('Service Worker registered', reg);
                })
                .catch(err => console.error('Service Worker registration failed', err));
        });

        // Слушаем смену активного воркера и автоматически перезагружаем страницу
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) {
                window.location.reload();
                refreshing = true;
            }
        });
    }

</script>
</body>
</html>
